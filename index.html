<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya</title>
    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }
        .card{
            background:rgba(255,255,255,.15);
            backdrop-filter:blur(10px);
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,.3);
        }
        h1{margin:0;font-size:40px;}
        p{font-size:18px;}
        button{
            padding:12px 25px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Halo 👋</h1>
    <p>Selamat datang di website saya.</p>
    <p>Website ini dibuat menggunakan GitHub Pages.</p>

    <button onclick="alert('Terima kasih sudah berkunjung!')">
        Klik Saya
    </button>
</div>

</body>
</html>
